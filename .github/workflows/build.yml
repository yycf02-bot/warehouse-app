name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y python3-pip build-essential git \
          libffi-dev libssl-dev libsqlite3-dev liblzma-dev \
          openjdk-17-jdk zip unzip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev cmake libstdc++6 libc6-i386
        pip install buildozer cython==0.29.33
    - name: Build APK
      run: buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: warehouse-app
        path: bin/*.apk
        retention-days: 30
